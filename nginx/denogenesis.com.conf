# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name denogenesis.com www.denogenesis.com;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://www.denogenesis.com$request_uri;
    }
}

# Primary HTTPS server (www)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.denogenesis.com denogenesis.com;
    server_tokens off;

    # Estimate form posts JSON (message field up to 2000 chars); 1k is too tight.
    client_max_body_size 16k;
    client_body_timeout 10s;
    client_header_timeout 10s;
    keepalive_timeout 30s;
    large_client_header_buffers 4 8k;

    ssl_certificate     /etc/letsencrypt/live/denogenesis.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/denogenesis.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # style-src/font-src allow Google Fonts (Big Shoulders Display / Barlow / IBM Plex Mono),
    # loaded from views/layout.ts.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; font-src 'self' https://fonts.gstatic.com; form-action 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Origin-Agent-Cluster "?1" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header X-XSS-Protection "0" always;

    gzip on;
    gzip_vary on;
    gzip_types
        text/css
        text/javascript
        application/javascript
        image/svg+xml;
    gzip_min_length 1024;
    gzip_comp_level 6;

    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Forwarded-Port  $server_port;
    proxy_set_header   Proxy             "";
    proxy_set_header   Upgrade           "";
    proxy_set_header   Connection        "";
    proxy_connect_timeout 10s;
    proxy_read_timeout    30s;
    proxy_send_timeout    30s;
    proxy_redirect off;

    location = /healthz {
        proxy_pass         http://127.0.0.1:8004;
        access_log off;
    }

    location / {
        if ($host = denogenesis.com) {
            return 301 https://www.denogenesis.com$request_uri;
        }

        proxy_pass         http://127.0.0.1:8004;
    }

    location = /favicon.ico {
        if ($host = denogenesis.com) {
            return 301 https://www.denogenesis.com$request_uri;
        }

        proxy_pass http://127.0.0.1:8004;
        access_log off;
    }

    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/scfllc-web-app.access.log;
    error_log  /var/log/nginx/scfllc-web-app.error.log;
}
